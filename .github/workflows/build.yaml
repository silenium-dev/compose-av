name: "Build and Test"
on:
  push:
    branches:
      - '*'
  pull_request:
  workflow_dispatch:
  release:
    types: [ published ]
permissions:
  pull-requests: write
  contents: write
jobs:
  natives:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        platform:
          - 'linux-x86_64'
          - 'linux-arm64'
          - 'windows-x86_64'
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: silenium-dev/actions/jni-natives/ubuntu@main
        with:
          gradle-cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}
          snapshot-repo-url: "https://reposilite.silenium.dev/snapshots"
          release-repo-url: "https://reposilite.silenium.dev/releases"
          repo-username: ${{ secrets.REPOSILITE_USERNAME }}
          repo-password: ${{ secrets.REPOSILITE_PASSWORD }}
          tests: false
          java-version: 17
          platform: ${{ matrix.platform }}
  kotlin:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: silenium-dev/actions/kotlin@main
        with:
          gradle-cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}
          snapshot-repo-url: "https://reposilite.silenium.dev/snapshots"
          release-repo-url: "https://reposilite.silenium.dev/releases"
          repo-username: ${{ secrets.REPOSILITE_USERNAME }}
          repo-password: ${{ secrets.REPOSILITE_PASSWORD }}
          tests: false
          java-version: 17
